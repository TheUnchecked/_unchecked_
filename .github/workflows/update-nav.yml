name: Update article navigation

on:
  workflow_dispatch:

jobs:
  update-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run nav update script
        run: python3 .github/scripts/update-nav.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articoli/
          git diff --staged --quiet || git commit -m "Auto: aggiorna navigazione prev/next"
          git push
